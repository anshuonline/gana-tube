<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GanaTube – Listen to Music Online</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Search and stream music online with GanaTube. Powered by YouTube. Enjoy a beautiful, modern music player experience." />
    <meta name="theme-color" content="#0d0d1a" />
    <link rel="icon" type="image/png" href="ganatube.png" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
  </head>
  <body>
    <app-root></app-root>
    <script>
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.addEventListener('copy', event => {
        if (event.target.tagName !== 'INPUT') event.preventDefault();
      });
      document.addEventListener('cut', event => {
        if (event.target.tagName !== 'INPUT') event.preventDefault();
      });
      document.addEventListener('selectstart', event => {
        if (event.target.tagName !== 'INPUT') event.preventDefault();
      });
      document.addEventListener('dragstart', event => event.preventDefault());
    </script>
  </body>
</html>
