<div class="modal-overlay" *ngIf="isOpen" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Edit Playlist</h2>
      <button class="close-btn" (click)="onClose()">
        <svg lucideX [attr.size]="24"></svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="playlistName" placeholder="Add a name" class="form-input" />
      </div>


    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="onClose()">Cancel</button>
      <button class="btn-save" (click)="onSave()" [disabled]="!playlistName.trim()">Save</button>
    </div>
  </div>
</div>
