<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Search & Add Song</h2>
      <button class="close-btn" (click)="closeModal()">
        <svg lucideX [attr.size]="24"></svg>
      </button>
    </div>

    <div class="search-bar-container">
      <div class="search-input-wrapper">
        <svg lucideSearch class="search-icon" [attr.size]="20"></svg>
        <input 
          type="text" 
          [(ngModel)]="searchQuery" 
          (keyup.enter)="performSearch()"
          placeholder="Search for a song..." 
          class="search-input"
          autofocus
        />
      </div>
      <button class="search-btn" (click)="performSearch()" [disabled]="isSearching || !searchQuery.trim()">
        <span *ngIf="!isSearching">Search</span>
        <svg *ngIf="isSearching" lucideRefreshCw class="spin" [attr.size]="20"></svg>
      </button>
    </div>

    <div class="results-container">
      <div *ngIf="!hasSearched" class="empty-state">
        <div class="empty-icon">
          <svg lucideSearch [attr.size]="48"></svg>
        </div>
        <p>Search for a song to add it to the list.</p>
      </div>

      <div *ngIf="isSearching" class="loading-state">
        <svg lucideRefreshCw class="spin big" [attr.size]="48"></svg>
        <p>Searching YouTube...</p>
      </div>

      <div *ngIf="hasSearched && !isSearching && searchResults.length === 0" class="empty-state">
        <p>No results found for "{{searchQuery}}".</p>
      </div>

      <div *ngIf="hasSearched && !isSearching && searchResults.length > 0" class="results-list">
        <div class="result-item" *ngFor="let result of searchResults" (click)="selectSong(result)">
          <div class="item-thumb">
            <img [src]="result.thumbnail" [alt]="result.title">
          </div>
          <div class="item-info">
            <h4 class="item-title">{{ result.title }}</h4>
            <p class="item-artist">{{ result.channelTitle }}</p>
          </div>
          <button class="add-btn">
            <svg lucidePlus [attr.size]="20"></svg>
            Add
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
