<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-[400px] mx-auto p-10 rounded-[2.5rem] bg-[#0c0c14]/80 backdrop-blur-3xl border border-white/5 shadow-2xl relative overflow-hidden animate-in fade-in slide-in-from-bottom-8 duration-500">
    <!-- Subtle gradient orb -->
    <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-500/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-indigo-500/20 rounded-full blur-3xl"></div>
    
    <div class="flex flex-col items-center mb-10 relative z-10">
      <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center backdrop-blur-xl border border-white/10 mb-6 shadow-inner">
        <img src="/ganatubenewlogo.png" alt="GanaTube" class="h-10 drop-shadow-md" />
      </div>
      <h2 class="text-3xl font-extrabold text-white tracking-tighter">Welcome Back</h2>
      <p class="text-white/40 text-sm mt-2 font-medium">Sign in to manage GanaTube</p>
    </div>
    
    <div class="space-y-5 relative z-10">
      <div class="space-y-2">
        <label class="text-xs font-bold text-white/40 uppercase tracking-widest px-1">Username</label>
        <input type="text" [(ngModel)]="username" placeholder="Enter username" class="w-full px-5 py-4 bg-white/5 border border-white/5 rounded-2xl text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all font-medium" />
      </div>

      <div class="space-y-2">
        <label class="text-xs font-bold text-white/40 uppercase tracking-widest px-1">Password</label>
        <input type="password" [(ngModel)]="password" placeholder="Enter password" (keyup.enter)="login()" class="w-full px-5 py-4 bg-white/5 border border-white/5 rounded-2xl text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all font-medium" />
      </div>

      <div class="p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-medium flex items-center" *ngIf="errorMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2 shrink-0"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        {{ errorMessage }}
      </div>

      <button class="w-full py-4 mt-4 bg-white hover:bg-gray-100 text-black font-bold rounded-2xl shadow-xl hover:shadow-2xl hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center" [disabled]="isLoading" (click)="login()">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="flex items-center">
          <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          Authenticating...
        </span>
      </button>
    </div>
  </div>
</div>
