<div class="login-card">
  <div class="logo">
    <img src="assets/images/ganatubenewlogo.png" alt="GanaTube" />
    <h2>ManageGT Admin</h2>
  </div>
  
  <div class="form-group">
    <label>Username</label>
    <input type="text" [(ngModel)]="username" placeholder="Enter username" />
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" [(ngModel)]="password" placeholder="Enter password" (keyup.enter)="login()" />
  </div>

  <div class="error-msg" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <button class="login-btn" [disabled]="isLoading" (click)="login()">
    {{ isLoading ? 'Logging in...' : 'Login' }}
  </button>
</div>
