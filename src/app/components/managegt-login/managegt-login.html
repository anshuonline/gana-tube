<div class="w-full max-w-md mx-auto mt-20 p-8 rounded-2xl bg-[#0a0a12]/80 backdrop-blur-xl border border-white/10 shadow-2xl shadow-purple-500/5">
  <div class="flex flex-col items-center mb-8">
    <img src="assets/images/ganatubenewlogo.png" alt="GanaTube" class="h-12 mb-4 drop-shadow-md" />
    <h2 class="text-2xl font-bold text-white tracking-tight">ManageGT Admin</h2>
    <p class="text-white/40 text-sm mt-1">Sign in to manage custom sections</p>
  </div>
  
  <div class="space-y-5">
    <div class="space-y-1.5">
      <label class="text-xs font-semibold text-white/50 uppercase tracking-wider">Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Enter username" class="w-full px-4 py-3 bg-black/40 border border-white/10 rounded-xl text-white placeholder-white/20 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all" />
    </div>

    <div class="space-y-1.5">
      <label class="text-xs font-semibold text-white/50 uppercase tracking-wider">Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter password" (keyup.enter)="login()" class="w-full px-4 py-3 bg-black/40 border border-white/10 rounded-xl text-white placeholder-white/20 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all" />
    </div>

    <div class="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-center" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2 shrink-0"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      {{ errorMessage }}
    </div>

    <button class="w-full py-3.5 mt-2 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-semibold rounded-xl shadow-lg shadow-purple-500/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center" [disabled]="isLoading" (click)="login()">
      <span *ngIf="!isLoading">Login</span>
      <span *ngIf="isLoading" class="flex items-center">
        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        Authenticating...
      </span>
    </button>
  </div>
</div>
