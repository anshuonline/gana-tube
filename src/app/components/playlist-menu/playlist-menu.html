<!-- Overlay to catch outside clicks and apply dimming -->
<div class="playlist-menu-overlay" *ngIf="isOpen && !showEditModal && !showDeleteConfirm" (click)="close($event)"></div>

<!-- Main Container -->
<div class="track-menu-container" *ngIf="isOpen && !showEditModal && !showDeleteConfirm" 
     [class.mobile]="isMobile" 
     [style.left.px]="!isMobile ? calculatedX : null" 
     [style.top.px]="!isMobile ? calculatedY : null"
     (click)="close($event)">
  
  <div class="menu-content-wrapper" (click)="$event.stopPropagation()">
    <!-- Mobile header with drag handle -->
    <div class="mobile-drag-handle" *ngIf="isMobile" (click)="close($event)">
      <div class="handle-bar"></div>
    </div>

    <!-- Menu Items -->
    <ul class="menu-list">
      
      <li (click)="shufflePlay($event)">
        <svg lucideShuffle [attr.size]="20"></svg>
        <span>Shuffle play</span>
      </li>

      <li (click)="editPlaylist($event)" *ngIf="!playlist?.is_saved">
        <svg lucideEdit [attr.size]="20"></svg>
        <span>Edit playlist</span>
      </li>

      <li (click)="playNext($event)">
        <svg lucideListStart [attr.size]="20"></svg>
        <span>Play next</span>
      </li>

      <li (click)="addToQueue($event)">
        <svg lucideListPlus [attr.size]="20"></svg>
        <span>Add to queue</span>
      </li>

      <li class="menu-item" (click)="saveToPlaylist($event)" *ngIf="playlist?.playlist_id && playlist?.playlist_id !== 'liked-songs' && playlist?.playlist_id !== 'history' && !playlist?.is_saved">
        <svg lucideFolderPlus [attr.size]="20"></svg>
        <span>Save to playlist</span>
      </li>

      <!-- Visibility Toggle -->
      <li class="menu-item" (click)="toggleVisibility($event)" *ngIf="playlist?.playlist_id && playlist?.playlist_id !== 'liked-songs' && playlist?.playlist_id !== 'history' && !playlist?.is_saved">
        <svg *ngIf="playlist?.is_public" lucideGlobe [attr.size]="20"></svg>
        <svg *ngIf="!playlist?.is_public" lucideLock [attr.size]="20"></svg>
        <span>Make {{ playlist?.is_public ? 'Private' : 'Public' }}</span>
      </li>

      <!-- Share Option -->
      <li class="menu-item" (click)="sharePlaylist($event)" *ngIf="playlist?.playlist_id && playlist?.playlist_id !== 'liked-songs' && playlist?.playlist_id !== 'history'">
        <svg lucideShare2 [attr.size]="20"></svg>
        <span>Share</span>
      </li>

      <!-- Delete option -->
      <li class="menu-item" (click)="deletePlaylist($event)" *ngIf="playlist?.playlist_id && playlist?.playlist_id !== 'liked-songs' && playlist?.playlist_id !== 'history'" style="color: #f44336;">
        <svg *ngIf="playlist?.is_saved" lucideTrash2 [attr.size]="20"></svg>
        <svg *ngIf="!playlist?.is_saved" lucideTrash2 [attr.size]="20"></svg>
        <span>{{ playlist?.is_saved ? 'Remove from library' : 'Delete playlist' }}</span>
      </li>
      
    </ul>
  </div>
</div>

<app-confirm-modal
  [isOpen]="showDeleteConfirm"
  title="Delete Playlist"
  message="Are you sure you want to delete this playlist? This action cannot be undone."
  confirmText="Delete"
  (confirm)="confirmDeleteAction()"
  (close)="showDeleteConfirm = false">
</app-confirm-modal>

<app-edit-playlist-modal
  [isOpen]="showEditModal"
  [initialName]="playlist?.name || ''"
  [initialIsPublic]="playlist?.is_public || false"
  (save)="saveEditDetails($event)"
  (close)="showEditModal = false; close()">
</app-edit-playlist-modal>
