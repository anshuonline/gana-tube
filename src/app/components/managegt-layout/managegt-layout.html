<div class="min-h-screen bg-black text-white flex font-sans">
  <!-- Sidebar -->
  <aside class="w-64 bg-[#0a0a12] border-r border-white/10 flex flex-col transition-all duration-300" *ngIf="isLoggedIn">
    <div class="h-16 flex items-center px-6 border-b border-white/10 shrink-0">
      <img src="assets/images/ganatubenewlogo.png" alt="GanaTube Admin" class="h-8 mr-3" />
      <span class="font-semibold text-lg text-white/90">Admin</span>
    </div>
    
    <nav class="flex-1 overflow-y-auto py-6 px-4">
      <ul class="space-y-2">
        <li>
          <a routerLink="/managegt/sections" routerLinkActive="bg-[#1a1a24] text-purple-400 border-l-4 border-purple-500" class="flex items-center px-4 py-3 rounded-md text-white/70 hover:bg-[#1a1a24] hover:text-white transition-colors cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-3"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            Manage Sections
          </a>
        </li>
      </ul>
    </nav>
    
    <div class="p-4 border-t border-white/10">
      <button (click)="logout()" class="w-full flex items-center justify-center px-4 py-2 rounded-md bg-white/5 hover:bg-red-500/10 text-white/70 hover:text-red-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 bg-black/95 overflow-x-hidden" [ngClass]="{'w-full': !isLoggedIn}">
    <router-outlet></router-outlet>
  </main>
</div>
