<div class="min-h-screen bg-black text-white flex font-sans selection:bg-purple-500/30 selection:text-purple-200">
  
  <!-- Mobile Header (Visible only on small screens) -->
  <div *ngIf="isLoggedIn" class="lg:hidden fixed top-0 left-0 right-0 h-16 bg-black/60 backdrop-blur-xl border-b border-white/10 z-50 flex items-center justify-between px-4">
    <div class="flex items-center">
      <img src="/ganatubenewlogo.png" alt="GanaTube Admin" class="h-6 mr-3" />
      <span class="font-semibold text-white">Admin</span>
    </div>
    <button (click)="toggleMobileMenu()" class="p-2 rounded-full hover:bg-white/10 transition-colors">
      <svg *ngIf="!isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      <svg *ngIf="isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>

  <!-- Sidebar Overlay for Mobile -->
  <div *ngIf="isLoggedIn && isMobileMenuOpen" (click)="closeMobileMenu()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 lg:hidden"></div>

  <!-- Sidebar -->
  <aside *ngIf="isLoggedIn" 
         [class.translate-x-0]="isMobileMenuOpen"
         [class.-translate-x-full]="!isMobileMenuOpen"
         class="fixed lg:static top-0 left-0 bottom-0 z-50 w-72 bg-[#050508]/80 backdrop-blur-2xl border-r border-white/5 flex flex-col transition-transform duration-300 ease-in-out lg:translate-x-0">
    
    <div class="h-16 flex items-center justify-center border-b border-white/5 bg-black/40">
      <img src="/ganatubenewlogo.png" alt="GanaTube Admin" class="h-6 mr-3" />
      <span class="font-bold text-white tracking-wide">Admin</span>
    </div>
    
    <nav class="flex-1 overflow-y-auto py-6 px-4">
      <div class="text-xs font-semibold text-white/30 uppercase tracking-widest px-4 mb-4">Menu</div>
      <ul class="space-y-1.5">
        <li>
          <a routerLink="/managegt/sections" (click)="closeMobileMenu()" routerLinkActive="bg-white/10 text-white shadow-sm" class="flex items-center px-4 py-3.5 rounded-2xl text-white/60 hover:bg-white/5 hover:text-white transition-all cursor-pointer font-medium">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500/20 to-purple-500/20 flex items-center justify-center mr-3 border border-white/5 text-purple-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            </div>
            Custom Sections
          </a>
        </li>
        <li>
          <a routerLink="/managegt/playlists" (click)="closeMobileMenu()" routerLinkActive="bg-white/10 text-white shadow-sm" class="flex items-center px-4 py-3.5 rounded-2xl text-white/60 hover:bg-white/5 hover:text-white transition-all cursor-pointer font-medium">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-pink-500/20 to-rose-500/20 flex items-center justify-center mr-3 border border-white/5 text-pink-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            </div>
            Custom Playlists
          </a>
        </li>
        <li>
          <a routerLink="/managegt/header" (click)="closeMobileMenu()" routerLinkActive="bg-white/10 text-white shadow-sm" class="flex items-center px-4 py-3.5 rounded-2xl text-white/60 hover:bg-white/5 hover:text-white transition-all cursor-pointer font-medium">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500/20 to-teal-500/20 flex items-center justify-center mr-3 border border-white/5 text-cyan-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="5" rx="1"></rect><rect x="3" y="12" width="7" height="9" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect></svg>
            </div>
            Manage Header
          </a>
        </li>
      </ul>

      <div class="text-xs font-semibold text-white/30 uppercase tracking-widest px-4 mt-8 mb-4">Analytics</div>
      <ul class="space-y-1.5">
        <li>
          <a routerLink="/managegt/users" (click)="closeMobileMenu()" routerLinkActive="bg-white/10 text-white shadow-sm" class="flex items-center px-4 py-3.5 rounded-2xl text-white/60 hover:bg-white/5 hover:text-white transition-all cursor-pointer font-medium">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500/20 to-indigo-500/20 flex items-center justify-center mr-3 border border-white/5 text-blue-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            </div>
            Users
          </a>
        </li>
      </ul>

    </nav>
    
    <div class="p-6">
      <button (click)="logout()" class="w-full flex items-center justify-center px-4 py-3.5 rounded-2xl bg-white/5 hover:bg-red-500/20 text-white/70 hover:text-red-400 transition-all font-medium border border-transparent hover:border-red-500/30">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 bg-black overflow-x-hidden min-h-screen pt-16 lg:pt-0" [ngClass]="{'w-full pt-0': !isLoggedIn}">
    <router-outlet></router-outlet>
  </main>
</div>
